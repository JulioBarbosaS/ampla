name: release

# Push a version tag (e.g. v1.2.3) to build and publish the image. The hub +
# panel ship as one multi-arch image to ghcr.io, so operators just `docker run`
# (or `docker compose up`) — no cloning, GitLab-style.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # github-release creates a Release
  packages: write

jobs:
  # Publish a GitHub Release whose notes are the CHANGELOG section for the tag
  # (Epic 09 · 9.4). scripts/changelog.sh extract is the single source of the
  # notes — the same file release.sh just cut. Inert without a remote.
  github-release:
    name: GitHub Release (notes from CHANGELOG)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: extract the CHANGELOG section for this tag
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "body<<__EOF__"
            scripts/changelog.sh extract "$version" || echo "See CHANGELOG.md."
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
      - name: create the release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}

  image:
    name: build + push multi-arch image (ghcr.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3 # arm64 emulation for the build
      - uses: docker/setup-buildx-action@v3
      - name: log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: tags + OCI labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # lowercased automatically; works on forks via repository_owner
          images: ghcr.io/${{ github.repository_owner }}/ampla
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
