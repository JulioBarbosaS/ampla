name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hub:
    name: hub · lint + testes + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: ruff format --check app tests
      # coverage gate (fail_under) vem do pyproject.toml
      - run: pytest --cov=app -q
      # supply-chain: fail on known CVEs in the resolved dependency tree
      - run: pip install pip-audit
      - run: pip-audit --skip-editable

  bridge:
    name: bridge · lint + testes + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: bridge/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome ci .
      - run: pnpm exec tsc --noEmit
      # full-stack é pulado aqui (sem hub/.venv) e coberto no job e2e
      - run: pnpm test:cov
      # supply-chain: fail on high/critical advisories in the *shipped* deps.
      # --prod excludes dev-only tooling (e.g. vitest), whose advisories never
      # reach the published daemon; Dependabot still opens PRs to bump those.
      - run: pnpm audit --prod --audit-level=high

  web:
    name: web · lint + testes + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome ci .
      - run: pnpm exec tsc -b
      - run: pnpm test:cov
      # supply-chain: fail on high/critical advisories in the *shipped* deps.
      # --prod excludes dev-only tooling (e.g. vitest), whose advisories never
      # reach the built panel bundle; Dependabot still opens PRs to bump those.
      - run: pnpm audit --prod --audit-level=high

  e2e-fullstack:
    name: e2e · hub real ↔ daemons reais
    runs-on: ubuntu-latest
    needs: [hub, bridge]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: bridge/pnpm-lock.yaml
      - name: venv do hub (usado pelo teste full-stack)
        working-directory: hub
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .
      - name: testes full-stack
        working-directory: bridge
        run: |
          pnpm install --frozen-lockfile
          pnpm exec vitest run tests/e2e

  e2e-web:
    name: e2e · painel (Playwright)
    runs-on: ubuntu-latest
    needs: [hub, web]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: venv do hub (webServer do Playwright)
        working-directory: hub
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .
      - name: playwright + e2e
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
          pnpm e2e
