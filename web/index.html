<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ampla</title>
    <!-- Files in public/ are served at the root by Vite, so reference /logo/…
         (not web/public/…). Two icons so the tab reads on light and dark. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/logo/ampla-icon-black.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/logo/ampla-icon-white.svg"
      media="(prefers-color-scheme: dark)"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
